name: Build & Release Windows Installer

on: [push]

jobs:
  build-installer:
    name: Compile Inno Setup Installer
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create LICENSE file if missing
        shell: powershell
        run: |
          if (-not (Test-Path "LICENSE")) {
            Set-Content -Path "LICENSE" -Value "MIT License"
          }

      - name: Compile Inno Setup installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: installer/setup.iss
          options: /O+

      - name: Upload installer to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: GrafanaDashboard-Installer
          path: installer/Output/*.exe
